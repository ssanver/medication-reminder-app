appId: com.suleymansanver.medicationreminder
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        id: "onboarding-skip-button"
    commands:
      - tapOn:
          id: "onboarding-skip-button"

- runFlow:
    when:
      visible:
        id: "signup-open-signin-link"
    commands:
      - tapOn:
          id: "signup-open-signin-link"

- extendedWaitUntil:
    visible:
      id: "signin-submit-button"
    timeout: 15000
- tapOn:
    id: "signin-submit-button"

- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 25000
- tapOn:
    id: "tab-settings"
- assertVisible:
    text: "^(Settings|Ayarlar)$"

- scrollUntilVisible:
    element:
      id: "settings-notification-settings-row"
    direction: DOWN
- tapOn:
    id: "settings-notification-settings-row"
- assertVisible:
    id: "notification-settings-done-button"
- assertVisible:
    text: "^(App Notifications|Uygulama bildirimleri)$"
- assertVisible:
    text: "^(Medication reminders|İlaç hatırlatmaları)$"
- tapOn:
    id: "notification-settings-done-button"

- assertVisible:
    id: "settings-snooze-duration-row"
- tapOn:
    id: "settings-snooze-duration-row"
- assertVisible:
    id: "reminder-preferences-done-button"
- tapOn: "15 min"
- tapOn:
    id: "reminder-preferences-done-button"

- assertVisible:
    text: "^(Settings|Ayarlar)$"
